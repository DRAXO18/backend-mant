services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sis_mant_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - sis_mant_network

  nginx:
    image: nginx:stable-alpine
    container_name: sis_mant_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sis_mant_network

  db:
    image: mysql:8.0
    container_name: sis_mant_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sis_mant
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sisuser
      MYSQL_PASSWORD: sispass
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - sis_mant_network

networks:
  sis_mant_network:

volumes:
  dbdata: